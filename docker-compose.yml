services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mateon-ai-postgres
    environment:
      POSTGRES_USER: mateon_ai
      POSTGRES_PASSWORD: mateon_ai
      POSTGRES_DB: mateon_ai
    ports:
      - "5433:5432"
    volumes:
      - mateon_ai_pgdata:/var/lib/postgresql/data

volumes:
  mateon_ai_pgdata:
